<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>

    <!-- TailwindCSS and DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script> 

    <!-- Google Fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">  

    <!-- Font Awesome CDN  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"> 

    <style>
        * {
            font-family: "Geist", sans-serif;
        }

        .page {
            display: none !important;
        }
        .page-active {
            display: block !important;
        }

        .card-open { 
            border-top: 4px solid #22c55e; 
        }

        .card-closed { 
            border-top: 4px solid #a855f7;
        }

        .spinner-overlay {
            position: fixed; inset: 0; 
            background: rgba(255,255,255,0.7);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 9999;
        }

        .tab-btn {
            padding: 8px 24px; 
            border-radius: 8px; 
            font-weight: 500;
            border: 1px solid #e5e7eb; 
            background: white; 
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active { 
            background: #4f46e5; 
            color: white; 
            border-color: #4f46e5; 
        }

        .priority-high { 
            background: #fee2e2; 
            color: #dc2626; 
        }

        .priority-medium { 
            background: #fef3c7; 
            color: #d97706; 
        }

        .priority-low { 
            background: #f3f4f6; 
            color: #6b7280; 
        }

        .label-bug { 
            background: #fee2e2; 
            color: #dc2626; 
        }

        .label-enhancement { 
            background: #d1fae5; 
            color: #059669; 
        }

        .label-help { 
            background: #fef3c7; 
            color: #d97706; 
        }

        .label-good-first-issue { 
            background: #dbeafe; 
            color: #2563eb; 
        }

        .label-documentation    { 
            background: #f3e8ff; 
            color: #7c3aed; 
        }

        .label-default          { 
            background: #ede9fe; 
            color: #7c3aed; 
        }

        .issue-card { 
            background: white; 
            border-radius: 10px; 
            box-shadow: 0 1px 4px rgba(0,0,0,0.08); 
            padding: 16px; 
            transition: box-shadow 0.2s; 
        }

        .issue-card:hover { 
            box-shadow: 0 4px 16px rgba(0,0,0,0.12); 
        }

        #modal-overlay { 
            display:none; 
            position:fixed; 
            inset:0; 
            background:rgba(0,0,0,0.5); 
            z-index:1000; 
            align-items:center; 
            justify-content:center; 
        }

        #modal-overlay.open { 
            display:flex; 
        }  
        
        .circle {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: inline-block;
        }

        .green {
            background-color: green;
        }

        .purple {
            background-color: #a855f7;
        }



    </style>
</head>
<body>
    <!-----------Login page------------->
    <div id="login-page" class="page active min-h-screen flex items-center justify-center bg-gray-100" style="display:flex !important;">
    <div class="bg-white rounded-2xl shadow-lg p-10 w-full max-w-md mx-4">

        <!-- Logo -->
        <div class="flex flex-col items-center mb-6">
        <div class="w-16 h-16 bg-gray-300 rounded-full flex items-center justify-center mb-4">
        <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-9 h-9">
        </div>
        <h1 class="text-2xl font-bold text-gray-900">GitHub Issues Tracker</h1>
        <p class="text-gray-500 text-sm mt-1">Sign in to manage your issues</p>
        </div>

        <!-- Error Alert -->
        <div id="login-error" class="alert alert-error mb-4" style="display:none;">
            <img src="./assets/error-icon.png" alt="Error" class="w-12">
            <span>Invalid username or password.</span>
        </div>

        <!-- Form -->
        <div>
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
            <input id="username-input" type="text" placeholder="Enter Username" class="input input-bordered w-full">
            <p class="text-xs text-indigo-500 mt-1">Default: admin</p>
        </div>
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input id="password-input" type="password" placeholder="Enter Password" class="input input-bordered w-full">
            <p class="text-xs text-indigo-500 mt-1">Default: admin123</p>
        </div>
        <button onclick="handleLogin()" class="btn w-full bg-indigo-600 hover:bg-indigo-700 text-white border-0 text-base font-semibold">Sign In</button>
        </div>

        <!-- Divider -->
        <div class="divider text-gray-400 text-sm my-4">OR</div>

        <!-- default login details -->
        <div class="text-center">
        <p class="text-sm text-gray-500 mb-2">Demo Credentials:</p>
        <div class="bg-gray-50 border border-gray-200 rounded-lg p-4 text-sm">
            <p><strong>Username:</strong> admin</p>
            <p><strong>Password:</strong> admin123</p>
        </div>
        </div>
    </div>
    </div>

   
    <script src="js/index.js"></script>
</body>
</html>
