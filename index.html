<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>

    <!-- TailwindCSS and DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script> 

    <!-- Google Fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">  

    <!-- Font Awesome CDN  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"> 

    <style>
        * {
            font-family: "Geist", sans-serif;
        }

        .page {
            display: none !important;
        }
        .page-active {
            display: block !important;
        }

        .card-open { 
            border-top: 4px solid #22c55e; 
        }

        .card-closed { 
            border-top: 4px solid #a855f7;
        }

        .spinner-overlay {
            position: fixed; inset: 0; 
            background: rgba(255,255,255,0.7);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 9999;
        }

        .tab-btn {
            padding: 8px 24px; 
            border-radius: 8px; 
            font-weight: 500;
            border: 1px solid #e5e7eb; 
            background: white; 
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active { 
            background: #4f46e5; 
            color: white; 
            border-color: #4f46e5; 
        }

        .priority-high { 
            background: #fee2e2; 
            color: #dc2626; 
        }

        .priority-medium { 
            background: #fef3c7; 
            color: #d97706; 
        }

        .priority-low { 
            background: #f3f4f6; 
            color: #6b7280; 
        }

        .label-bug { 
            background: #fee2e2; 
            color: #dc2626; 
        }

        .label-enhancement { 
            background: #d1fae5; 
            color: #059669; 
        }

        .label-help { 
            background: #fef3c7; 
            color: #d97706; 
        }

        .label-good-first-issue { 
            background: #dbeafe; 
            color: #2563eb; 
        }

        .label-documentation    { 
            background: #f3e8ff; 
            color: #7c3aed; 
        }

        .label-default          { 
            background: #ede9fe; 
            color: #7c3aed; 
        }

        .issue-card { 
            background: white; 
            border-radius: 10px; 
            box-shadow: 0 1px 4px rgba(0,0,0,0.08); 
            padding: 16px; 
            transition: box-shadow 0.2s; 
        }

        .issue-card:hover { 
            box-shadow: 0 4px 16px rgba(0,0,0,0.12); 
        }

        #modal-overlay { 
            display:none; 
            position:fixed; 
            inset:0; 
            background:rgba(0,0,0,0.5); 
            z-index:1000; 
            align-items:center; 
            justify-content:center; 
        }

        #modal-overlay.open { 
            display:flex; 
        }  
        
        .circle {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: inline-block;
        }

        .green {
            background-color: green;
        }

        .purple {
            background-color: #a855f7;
        }



    </style>
</head>
<body>
    <h1>Hello</h1>
    <script src="js/index.js"></script>
</body>
</html>
